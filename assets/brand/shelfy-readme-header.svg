<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Shelfy</title>
  <desc id="desc">Telegram bot for tracking product expiration dates</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#123047"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ecfeff" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <path d="M86 338 C192 238 316 364 438 264 C560 164 704 224 812 132 C924 36 1062 100 1194 58" fill="none" stroke="#67e8f9" stroke-width="4" stroke-opacity="0.35"/>
  <path d="M80 92 C188 172 300 76 426 156 C548 234 694 130 826 212 C972 302 1084 188 1200 244" fill="none" stroke="#bbf7d0" stroke-width="4" stroke-opacity="0.28"/>
  <g filter="url(#shadow)">
    <rect x="80" y="70" width="590" height="280" rx="28" fill="url(#card)"/>
    <text x="126" y="150" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" fill="#0f172a">Shelfy</text>
    <text x="130" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" fill="#2563eb">Telegram bot for product expiry tracking</text>
    <text x="130" y="250" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Pinned dashboard. Draft-first input.</text>
    <text x="130" y="286" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Text, voice, digests, and real Telegram e2e tests.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="760" y="78" width="380" height="264" rx="34" fill="#f8fafc"/>
    <rect x="800" y="112" width="300" height="42" rx="18" fill="#dbeafe"/>
    <rect x="800" y="180" width="232" height="34" rx="17" fill="#dcfce7"/>
    <rect x="800" y="232" width="280" height="34" rx="17" fill="#fef3c7"/>
    <circle cx="1050" cy="286" r="24" fill="#22c55e"/>
    <path d="M1039 286 l8 8 l16 -19" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="832" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">Dashboard</text>
    <text x="832" y="204" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">Milk until Friday</text>
    <text x="832" y="256" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">Morning digest</text>
  </g>
